<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>陈莹莹 生日快乐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0015;font-family:'Ma Shan Zheng','PingFang SC','Microsoft YaHei',serif;color:#fff;-webkit-font-smoothing:antialiased}

/* ── scroll container ── */
#app{width:100%;height:100%;overflow-y:auto;scroll-snap-type:y mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.scene{position:relative;width:100%;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;scroll-snap-align:start;overflow:hidden}

/* ── Scene 1 : starry sky ── */
#scene1{background:linear-gradient(180deg,#0a0015 0%,#150030 50%,#1a0a3e 100%)}
#starCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.hero-name{position:relative;z-index:2;text-align:center;opacity:0;animation:fadeInUp 2s ease 0.5s forwards}
.hero-name .line1{font-size:clamp(1.4rem,5vw,2.2rem);color:rgba(255,255,255,.7);margin-bottom:.3em;letter-spacing:.15em}
.hero-name .name{font-size:clamp(2.8rem,10vw,5rem);background:linear-gradient(135deg,#ffd6e0,#ffabe1,#c9a0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,150,200,.5));letter-spacing:.12em}
.scroll-hint{position:absolute;bottom:6vh;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeIn 1.5s ease 2.5s forwards}
.scroll-hint span{font-size:.85rem;color:rgba(255,255,255,.45);letter-spacing:.2em}
.scroll-hint .arrow{width:20px;height:20px;border-right:2px solid rgba(255,255,255,.4);border-bottom:2px solid rgba(255,255,255,.4);transform:rotate(45deg);animation:bounceDown 1.6s ease infinite}

/* ── Scene 2 : fireworks ── */
#scene2{background:linear-gradient(180deg,#0d0020 0%,#1a0035 100%)}
#fireworkCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.birthday-text{position:relative;z-index:2;font-size:clamp(2.4rem,9vw,4.5rem);letter-spacing:.15em;text-align:center}
.birthday-text span{display:inline-block;opacity:0;transform:translateY(40px) scale(0.3);animation:popIn .6s cubic-bezier(.18,.89,.32,1.28) forwards}
.birthday-text .char0{animation-delay:0.5s}
.birthday-text .char1{animation-delay:0.7s}
.birthday-text .char2{animation-delay:0.9s}
.birthday-text .char3{animation-delay:1.1s}
.birthday-text .char4{animation-delay:1.3s}
.birthday-text .char5{animation-delay:1.5s}
.birthday-sub{position:relative;z-index:2;margin-top:1em;font-size:clamp(1rem,3.5vw,1.5rem);color:rgba(255,220,180,.8);opacity:0;animation:fadeIn 1.2s ease 2.2s forwards;letter-spacing:.2em}

/* ── Scene 3 : hearts + confession ── */
#scene3{background:linear-gradient(180deg,#1a0030 0%,#2d0a4e 50%,#1a0030 100%)}
.hearts-container{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none}
.heart{position:absolute;top:-10%;font-style:normal;animation:heartFall linear forwards;opacity:0}
.confession{position:relative;z-index:2;text-align:center;padding:0 2em;max-width:600px}
.confession .line{font-size:clamp(1.3rem,4.5vw,2rem);line-height:2;opacity:0;transform:translateY(20px);letter-spacing:.08em}
.confession .line.l1{animation:fadeInUp 1s ease .3s forwards}
.confession .line.l2{animation:fadeInUp 1s ease 1s forwards}
.confession .line.l3{animation:fadeInUp 1s ease 1.7s forwards;background:linear-gradient(90deg,#ffa0c4,#ffcce0,#ffa0c4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:clamp(1.6rem,5.5vw,2.6rem)}
.big-heart{position:relative;z-index:2;margin-top:1.5em;font-size:3rem;animation:heartbeat 1s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,100,150,.6))}

/* ── Scene 4 : cake + finale ── */
#scene4{background:linear-gradient(180deg,#150028 0%,#0d0020 100%)}
#confettiCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.cake-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cake{position:relative;width:clamp(140px,40vw,200px)}
.cake-layer{border-radius:12px;position:relative}
.cake-top{width:70%;height:clamp(35px,9vw,50px);background:linear-gradient(180deg,#ff9ec5,#e87aaa);margin:0 auto;border-radius:12px 12px 4px 4px;box-shadow:0 4px 15px rgba(255,120,170,.3)}
.cake-mid{width:85%;height:clamp(40px,10vw,55px);background:linear-gradient(180deg,#ffb6d3,#f29abb);margin:0 auto;border-radius:4px;box-shadow:0 4px 15px rgba(255,120,170,.2)}
.cake-bot{width:100%;height:clamp(45px,12vw,65px);background:linear-gradient(180deg,#ffc8df,#f2a8c5);margin:0 auto;border-radius:4px 4px 14px 14px;box-shadow:0 6px 20px rgba(255,120,170,.25)}
.icing{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);width:75%;height:10px;overflow:hidden}
.icing::before{content:'';display:block;width:200%;height:20px;background:repeating-radial-gradient(circle at 10px 0,#fff 0,#fff 10px,transparent 10px,transparent 20px);opacity:.5}
.candles{display:flex;justify-content:center;gap:clamp(12px,4vw,20px);margin-bottom:-4px;position:relative;z-index:3}
.candle{width:6px;height:clamp(30px,8vw,45px);background:linear-gradient(180deg,#ffe566,#ffcc33);border-radius:3px 3px 1px 1px;position:relative}
.flame-wrap{position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:14px;height:20px;transition:opacity .5s}
.flame{width:14px;height:20px;background:radial-gradient(ellipse at 50% 90%,#fffbe6,#ffe066 40%,#ff9933 70%,transparent 100%);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;animation:flicker .15s ease-in-out infinite alternate;filter:blur(0.5px)}
.flame-glow{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:30px;height:30px;background:radial-gradient(circle,rgba(255,200,60,.35),transparent 70%);animation:glowPulse 1s ease-in-out infinite alternate;pointer-events:none}
.candle.blown .flame-wrap{opacity:0}
.candle.blown .flame-glow{opacity:0}
.cake-hint{margin-top:1.2em;font-size:clamp(.8rem,2.8vw,1rem);color:rgba(255,255,255,.4);letter-spacing:.15em;transition:opacity .6s}
.cake-hint.hidden{opacity:0}

.finale-text{position:relative;z-index:2;margin-top:2em;text-align:center;opacity:0;transition:opacity 1.2s ease}
.finale-text.show{opacity:1}
.finale-text .fl1{font-size:clamp(1.2rem,4vw,1.8rem);color:rgba(255,255,255,.8);letter-spacing:.15em;line-height:2}
.finale-text .fl2{font-size:clamp(1rem,3vw,1.3rem);color:rgba(255,200,220,.6);margin-top:.5em;letter-spacing:.2em}

/* ── keyframes ── */
@keyframes fadeIn{to{opacity:1}}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
@keyframes popIn{to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bounceDown{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(8px)}}
@keyframes heartFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:0}
  10%{opacity:.7}
  90%{opacity:.5}
  100%{transform:translateY(120vh) rotate(720deg) scale(.5);opacity:0}
}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  15%{transform:scale(1.15)}
  30%{transform:scale(1)}
  45%{transform:scale(1.1)}
}
@keyframes flicker{
  0%{transform:scale(1,1) rotate(-1deg)}
  100%{transform:scale(1.05,1.1) rotate(1deg)}
}
@keyframes glowPulse{
  0%{opacity:.4;transform:translateX(-50%) scale(1)}
  100%{opacity:.7;transform:translateX(-50%) scale(1.2)}
}
@keyframes sparkle{
  0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
  50%{opacity:1;transform:scale(1) rotate(180deg)}
}
</style>
</head>
<body>
<div id="app">

  <!-- Scene 1 — 星空开场 -->
  <section class="scene" id="scene1">
    <canvas id="starCanvas"></canvas>
    <div class="hero-name">
      <div class="line1">亲爱的</div>
      <div class="name">陈莹莹</div>
    </div>
    <div class="scroll-hint">
      <span>向上滑动</span>
      <div class="arrow"></div>
    </div>
  </section>

  <!-- Scene 2 — 烟花绽放 -->
  <section class="scene" id="scene2">
    <canvas id="fireworkCanvas"></canvas>
    <div class="birthday-text">
      <span class="char0">祝</span>
      <span class="char1">你</span>
      <span class="char2">生</span>
      <span class="char3">日</span>
      <span class="char4">快</span>
      <span class="char5">乐</span>
    </div>
    <div class="birthday-sub">🎂 Happy Birthday 🎂</div>
  </section>

  <!-- Scene 3 — 爱心告白 -->
  <section class="scene" id="scene3">
    <div class="hearts-container" id="heartsContainer"></div>
    <div class="confession">
      <div class="line l1">遇见你，是我最大的幸运</div>
      <div class="line l2">往后余生，都是你</div>
      <div class="line l3">我爱你，陈莹莹 ❤️</div>
    </div>
    <div class="big-heart">❤️</div>
  </section>

  <!-- Scene 4 — 生日蛋糕 -->
  <section class="scene" id="scene4">
    <canvas id="confettiCanvas"></canvas>
    <div class="cake-wrap" id="cakeWrap">
      <div class="candles">
        <div class="candle"><div class="flame-wrap"><div class="flame"></div></div><div class="flame-glow"></div></div>
        <div class="candle"><div class="flame-wrap"><div class="flame"></div></div><div class="flame-glow"></div></div>
        <div class="candle"><div class="flame-wrap"><div class="flame"></div></div><div class="flame-glow"></div></div>
      </div>
      <div class="cake">
        <div class="cake-layer cake-top"><div class="icing"></div></div>
        <div class="cake-layer cake-mid"></div>
        <div class="cake-layer cake-bot"></div>
      </div>
    </div>
    <div class="cake-hint" id="cakeHint">✨ 点击蜡烛许个愿吧 ✨</div>
    <div class="finale-text" id="finaleText">
      <div class="fl1">愿你每一天都开心</div>
      <div class="fl2">— 永远爱你的人 💕</div>
    </div>
  </section>

</div>

<script>
/* ================================================================
   Utils
   ================================================================ */
const dpr = Math.min(window.devicePixelRatio || 1, 2);
function sizeCanvas(canvas) {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width * dpr;
  canvas.height = r.height * dpr;
  canvas.style.width = r.width + 'px';
  canvas.style.height = r.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { w: r.width, h: r.height, ctx };
}

/* ================================================================
   Scene 1 — Star Field
   ================================================================ */
(function initStars() {
  const canvas = document.getElementById('starCanvas');
  let { w, h, ctx } = sizeCanvas(canvas);
  const count = Math.min(Math.floor(w * h / 800), 400);
  let stars = [];

  function createStars() {
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.5 + 0.3,
        a: Math.random(),
        speed: Math.random() * 0.005 + 0.002,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  createStars();

  let shootingStars = [];
  function maybeShoot() {
    if (Math.random() < 0.008 && shootingStars.length < 2) {
      shootingStars.push({
        x: Math.random() * w * 0.8,
        y: Math.random() * h * 0.3,
        len: Math.random() * 80 + 60,
        speed: Math.random() * 4 + 4,
        angle: Math.PI / 4 + Math.random() * 0.3,
        life: 1
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    t += 0.016;
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });

    maybeShoot();
    shootingStars.forEach((s, i) => {
      s.x += Math.cos(s.angle) * s.speed;
      s.y += Math.sin(s.angle) * s.speed;
      s.life -= 0.015;
      if (s.life <= 0) { shootingStars.splice(i, 1); return; }
      ctx.save();
      const grad = ctx.createLinearGradient(
        s.x, s.y,
        s.x - Math.cos(s.angle) * s.len,
        s.y - Math.sin(s.angle) * s.len
      );
      grad.addColorStop(0, `rgba(255,255,255,${s.life})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(
        s.x - Math.cos(s.angle) * s.len,
        s.y - Math.sin(s.angle) * s.len
      );
      ctx.stroke();
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener('resize', () => {
    ({ w, h, ctx } = sizeCanvas(canvas));
    createStars();
  });
})();

/* ================================================================
   Scene 2 — Fireworks
   ================================================================ */
(function initFireworks() {
  const canvas = document.getElementById('fireworkCanvas');
  let { w, h, ctx } = sizeCanvas(canvas);
  let particles = [];
  let rockets = [];
  let active = false;

  const colors = [
    '#ff6b9d','#ffa8cc','#c084fc','#67e8f9','#fde68a',
    '#fb923c','#a78bfa','#f472b6','#34d399','#fbbf24'
  ];

  function launchRocket() {
    rockets.push({
      x: w * 0.2 + Math.random() * w * 0.6,
      y: h,
      targetY: h * 0.15 + Math.random() * h * 0.3,
      speed: 4 + Math.random() * 3,
      trail: []
    });
  }

  function explode(x, y) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    const count = 60 + Math.floor(Math.random() * 40);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
      const v = 1.5 + Math.random() * 3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v,
        life: 1,
        decay: 0.008 + Math.random() * 0.01,
        color,
        r: 1.5 + Math.random() * 1.5
      });
    }
  }

  function draw() {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(13,0,32,0.15)';
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'lighter';

    rockets.forEach((r, i) => {
      r.y -= r.speed;
      r.trail.push({ x: r.x, y: r.y, a: 1 });
      if (r.trail.length > 8) r.trail.shift();

      r.trail.forEach((t, ti) => {
        t.a -= 0.12;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,220,180,${Math.max(0, t.a)})`;
        ctx.fill();
      });

      if (r.y <= r.targetY) {
        explode(r.x, r.y);
        rockets.splice(i, 1);
      }
    });

    particles.forEach((p, i) => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.03;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); return; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    if (active) requestAnimationFrame(draw);
  }

  let launchInterval;
  const observer2 = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && !active) {
        active = true;
        ctx.clearRect(0, 0, w, h);
        draw();
        launchRocket();
        setTimeout(launchRocket, 400);
        setTimeout(launchRocket, 900);
        launchInterval = setInterval(() => {
          if (active) {
            launchRocket();
            if (Math.random() > 0.5) setTimeout(launchRocket, 200 + Math.random() * 300);
          }
        }, 1200);
      } else if (!e.isIntersecting && active) {
        active = false;
        clearInterval(launchInterval);
      }
    });
  }, { threshold: 0.3 });
  observer2.observe(document.getElementById('scene2'));

  window.addEventListener('resize', () => {
    ({ w, h, ctx } = sizeCanvas(canvas));
  });
})();

/* ================================================================
   Scene 3 — Falling Hearts
   ================================================================ */
(function initHearts() {
  const container = document.getElementById('heartsContainer');
  const heartChars = ['❤️','💕','💖','💗','💓','🩷','♥'];
  let created = false;

  function createHearts() {
    if (created) return;
    created = true;
    for (let i = 0; i < 35; i++) {
      const el = document.createElement('i');
      el.className = 'heart';
      el.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
      const size = 0.6 + Math.random() * 1.4;
      const dur = 4 + Math.random() * 6;
      const delay = Math.random() * 8;
      const left = Math.random() * 100;
      el.style.cssText = `
        left:${left}%;
        font-size:${size}rem;
        animation-duration:${dur}s;
        animation-delay:${delay}s;
        animation-iteration-count:infinite;
      `;
      container.appendChild(el);
    }
  }

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) createHearts(); });
  }, { threshold: 0.2 });
  obs.observe(document.getElementById('scene3'));
})();

/* ================================================================
   Scene 3 — Confession text replay on re-enter
   ================================================================ */
(function replayConfession() {
  const scene = document.getElementById('scene3');
  const lines = scene.querySelectorAll('.confession .line');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        lines.forEach(l => {
          const clone = l.cloneNode(true);
          l.parentNode.replaceChild(clone, l);
        });
      }
    });
  }, { threshold: 0.3 });
  obs.observe(scene);
})();

/* ================================================================
   Scene 4 — Cake blow & Confetti
   ================================================================ */
(function initCake() {
  const wrap = document.getElementById('cakeWrap');
  const hint = document.getElementById('cakeHint');
  const finale = document.getElementById('finaleText');
  const candles = wrap.querySelectorAll('.candle');
  let blown = false;

  const confettiCanvas = document.getElementById('confettiCanvas');
  let { w, h, ctx } = sizeCanvas(confettiCanvas);
  let confetti = [];
  let confettiActive = false;

  const confettiColors = ['#ff6b9d','#fde68a','#67e8f9','#a78bfa','#34d399','#fb923c','#f472b6','#c084fc','#fbbf24','#fff'];

  function spawnConfetti() {
    for (let i = 0; i < 150; i++) {
      confetti.push({
        x: w * 0.3 + Math.random() * w * 0.4,
        y: h * 0.3 + Math.random() * h * 0.1,
        vx: (Math.random() - 0.5) * 8,
        vy: -(Math.random() * 6 + 2),
        r: 3 + Math.random() * 5,
        color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 12,
        life: 1,
        decay: 0.003 + Math.random() * 0.004,
        shape: Math.random() > 0.5 ? 'rect' : 'circle'
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, w, h);
    confetti.forEach((c, i) => {
      c.x += c.vx;
      c.y += c.vy;
      c.vy += 0.12;
      c.vx *= 0.99;
      c.rotation += c.rotSpeed;
      c.life -= c.decay;
      if (c.life <= 0) { confetti.splice(i, 1); return; }

      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rotation * Math.PI / 180);
      ctx.globalAlpha = c.life;
      ctx.fillStyle = c.color;
      if (c.shape === 'rect') {
        ctx.fillRect(-c.r / 2, -c.r / 2, c.r, c.r * 0.6);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, c.r / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });

    if (confetti.length > 0) {
      requestAnimationFrame(drawConfetti);
    } else {
      confettiActive = false;
    }
  }

  wrap.addEventListener('click', () => {
    if (blown) return;
    blown = true;
    candles.forEach((c, i) => {
      setTimeout(() => c.classList.add('blown'), i * 150);
    });
    hint.classList.add('hidden');

    setTimeout(() => {
      confettiActive = true;
      spawnConfetti();
      drawConfetti();
      setTimeout(spawnConfetti, 400);
      setTimeout(spawnConfetti, 900);
    }, 500);

    setTimeout(() => finale.classList.add('show'), 1200);
  });

  window.addEventListener('resize', () => {
    ({ w, h, ctx } = sizeCanvas(confettiCanvas));
  });
})();

/* ================================================================
   Scene 2 — text animation replay on scroll back
   ================================================================ */
(function replayBirthday() {
  const scene = document.getElementById('scene2');
  const text = scene.querySelector('.birthday-text');
  const sub = scene.querySelector('.birthday-sub');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const chars = text.querySelectorAll('span');
        chars.forEach(c => {
          const cl = c.cloneNode(true);
          c.parentNode.replaceChild(cl, c);
        });
        const subClone = sub.cloneNode(true);
        sub.parentNode.replaceChild(subClone, sub);
      }
    });
  }, { threshold: 0.3 });
  obs.observe(scene);
})();
</script>
</body>
